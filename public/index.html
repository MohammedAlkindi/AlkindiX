<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Alkindi</title>
  <meta name="description" content="Personal HQ — systems, computation, photography, and thoughtful work."/>
  <link rel="canonical" href="https://alkindix.com/"/>
  <meta property="og:title" content="Alkindi"/>
  <meta property="og:description" content="Systems, computation, photography, and thoughtful work."/>
  <meta property="og:type" content="website"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    body {
      padding-top: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: calc(68px + 2rem) 1.5rem 2rem;
    }

    .hero__wrap {
      max-width: 720px;
      width: 100%;
    }

    .hero__h1 {
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.08;
      margin-bottom: 1.75rem;
      color: var(--accent);
    }

    .hero__sub {
      font-size: 1.125rem;
      color: var(--muted);
      line-height: 1.75;
      max-width: 580px;
      margin: 0 auto 2.75rem;
      opacity: 1;
    }

    .hero__actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      .hero__h1 { font-size: 2.6rem; }
      .hero__sub { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <header class="nav" role="banner">
    <div class="container nav__inner">
      <a class="brand" href="/" aria-label="Alkindi home">Alkindi</a>
      <button class="nav__toggle" aria-expanded="false" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav__links" role="navigation" aria-label="Primary">
        <a href="/about">About</a>
        <a href="/photography">Photography</a>
        <a href="/memoir">Memoir</a>
        <a href="https://github.com/MohammedAlkindi/" target="_blank" rel="noopener" class="nav-external">
          GitHub <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M8.5 1.5h-7m7 0v7m0-7L1.5 8.5" stroke="currentColor" stroke-width="1.4"/></svg>
        </a>
        <a href="https://www.linkedin.com/in/alkindi-network/" target="_blank" rel="noopener" class="nav-external">
          LinkedIn <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M8.5 1.5h-7m7 0v7m0-7L1.5 8.5" stroke="currentColor" stroke-width="1.4"/></svg>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__wrap">
        <h1 id="hero-title" class="hero__h1" data-reveal>Hi, I am Alkindi.</h1>
        <p class="hero__sub" data-reveal>
          I build and study systems where ideas become structure and structure becomes
          clarity. This space documents research tools, computational projects, and long-form thinking.
        </p>
        <div class="hero__actions" data-reveal>
          <a href="/about" class="btn btn--primary">About me</a>
          <a href="/photography" class="btn">Photography</a>
          <a href="/memoir" class="btn">Memoir</a>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
